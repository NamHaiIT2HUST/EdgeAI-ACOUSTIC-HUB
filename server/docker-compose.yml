version: '3.8'

services:
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: edgeai_mqtt_broker
    ports:
      - "1883:1883" #Cổng giao tiếp MQTT
      - "9001:9001" #Cổng WebSocket
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf 
    restart: always